# Traefik v2 static configuration.
# Routes/middlewares are NOT declared here — they live as labels on the
# services in compose/production/prod.yml (see the docker provider below).

log:
  level: INFO

accessLog: {}

api:
  dashboard: true
  insecure: false

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
  websecure:
    address: ":443"

certificatesResolvers:
  letsencrypt:
    acme:
      # The `email` field is set at runtime via the
      # TRAEFIK_CERTIFICATESRESOLVERS_LETSENCRYPT_ACME_EMAIL environment
      # variable (see the traefik service in prod.yml). Leave blank here.
      email: ""
      storage: /etc/traefik/acme/acme.json
      httpChallenge:
        entryPoint: web

providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    network: edge
    exposedByDefault: false
    watch: true
